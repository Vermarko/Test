name: Playwright Tests (.NET)
env:
  HEADLESS: false
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: PlayWriteTests

      - name: Build
        run: dotnet build --configuration Debug --no-restore
        working-directory: PlayWriteTests

      - name: Install Playwright browsers
        run: pwsh bin/Debug/net10.0/playwright.ps1 install --with-deps
        working-directory: PlayWriteTests

      - name: Run Playwright tests
        run: dotnet test --logger "trx;LogFileName=test-results.trx"
        working-directory: PlayWriteTests
        
      - name: Generate HTML report
        run: |
         dotnet tool install -g dotnet-reportgenerator-globaltool
         reportgenerator -reports:**/test-results.trx -targetdir:report -reporttypes:Html
                  
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: PlayWriteTests/bin/Debug/net10.0/playwright-report/
          if-no-files-found: warn
